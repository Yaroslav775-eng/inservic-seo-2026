<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Діагностика електровелосипеда в майстерні InService">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="0.55" stop-color="#fff5ee"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
      <stop offset="0" stop-color="#667386"/>
      <stop offset="0.5" stop-color="#aeb8c5"/>
      <stop offset="1" stop-color="#465467"/>
    </linearGradient>
    <linearGradient id="battery" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202d3d"/>
      <stop offset="1" stop-color="#050b14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#10243d" flood-opacity="0.2"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="42" fill="url(#wall)"/>
  <rect x="0" y="0" width="1200" height="720" rx="42" fill="none" stroke="#dce6f2" stroke-width="2"/>

  <!-- workshop background -->
  <g opacity="0.62">
    <rect x="790" y="72" width="300" height="390" rx="24" fill="#fff" stroke="#dce6f2"/>
    <g stroke="#b8c7d8" stroke-width="5" stroke-linecap="round">
      <path d="M835 150h160M835 220h210M835 290h180M835 360h230" opacity="0.38"/>
      <path d="M858 124v58M922 122v74M996 120v88M1048 126v68" opacity="0.55"/>
    </g>
    <g fill="#10243d" opacity="0.62">
      <rect x="850" y="132" width="16" height="78" rx="8"/>
      <rect x="910" y="132" width="18" height="110" rx="9"/>
      <rect x="988" y="132" width="14" height="95" rx="7"/>
      <rect x="1038" y="132" width="18" height="104" rx="9"/>
    </g>
    <rect x="650" y="510" width="430" height="36" rx="18" fill="#d8b283" opacity="0.6"/>
    <rect x="640" y="545" width="460" height="30" rx="15" fill="#9e6d43" opacity="0.2"/>
  </g>

  <!-- light glow -->
  <ellipse cx="590" cy="370" rx="430" ry="245" fill="#ffffff" opacity="0.45" filter="url(#soft)"/>

  <!-- service stand -->
  <g stroke="#10243d" stroke-width="14" stroke-linecap="round" opacity="0.88">
    <path d="M570 115v455"/>
    <path d="M505 595h135"/>
    <path d="M570 178l92 22"/>
  </g>
  <rect x="535" y="105" width="70" height="42" rx="16" fill="#1f74b7"/>

  <!-- bike -->
  <g filter="url(#shadow)">
    <circle cx="310" cy="510" r="122" fill="#fff" stroke="#13253a" stroke-width="22"/>
    <circle cx="310" cy="510" r="82" fill="none" stroke="#dce6f2" stroke-width="3"/>
    <circle cx="310" cy="510" r="26" fill="#f26522"/>
    <circle cx="850" cy="510" r="122" fill="#fff" stroke="#13253a" stroke-width="22"/>
    <circle cx="850" cy="510" r="82" fill="none" stroke="#dce6f2" stroke-width="3"/>
    <circle cx="850" cy="510" r="38" fill="#0e1724" stroke="#f26522" stroke-width="8"/>
    <circle cx="850" cy="510" r="12" fill="#fff"/>

    <!-- spokes -->
    <g stroke="#425267" stroke-width="2" opacity="0.8">
      <path d="M310 510l0-122M310 510l86-86M310 510l122 0M310 510l86 86M310 510l0 122M310 510l-86 86M310 510l-122 0M310 510l-86-86"/>
      <path d="M850 510l0-122M850 510l86-86M850 510l122 0M850 510l86 86M850 510l0 122M850 510l-86 86M850 510l-122 0M850 510l-86-86"/>
    </g>

    <!-- frame -->
    <g fill="none" stroke="url(#metal)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
      <path d="M310 510L470 300L675 300L850 510"/>
      <path d="M470 300L585 510L675 300"/>
      <path d="M310 510L585 510L850 510"/>
      <path d="M675 300L760 190"/>
      <path d="M470 300L410 190"/>
    </g>
    <g fill="none" stroke="#10243d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <path d="M410 190h-95"/>
      <path d="M760 190h105l62 36"/>
      <path d="M745 208l75 20"/>
    </g>

    <!-- battery and controller area -->
    <rect x="490" y="338" width="168" height="82" rx="22" fill="url(#battery)" stroke="#314158" stroke-width="4"/>
    <rect x="505" y="354" width="78" height="12" rx="6" fill="#51627a" opacity="0.75"/>
    <rect x="505" y="374" width="118" height="10" rx="5" fill="#51627a" opacity="0.48"/>
    <rect x="600" y="447" width="126" height="70" rx="18" fill="#172235" stroke="#f26522" stroke-width="5"/>
    <g stroke="#f26522" stroke-width="6" stroke-linecap="round">
      <path d="M635 470h46M635 492h70"/>
    </g>
    <g stroke="#1f74b7" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M658 421c36 30 25 54 58 70"/>
      <path d="M602 421c-45 35-78 48-105 78"/>
    </g>
    <g stroke="#f26522" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M720 489c38 0 58 6 92 21"/>
      <path d="M614 486c-48 8-74 14-116 30"/>
    </g>
  </g>

  <!-- mechanic hands and multimeter -->
  <g>
    <rect x="405" y="610" width="185" height="66" rx="20" fill="#f5b083" transform="rotate(-8 405 610)" opacity="0.98"/>
    <rect x="426" y="635" width="122" height="38" rx="18" fill="#e29a70" transform="rotate(-8 426 635)"/>
    <rect x="628" y="598" width="148" height="60" rx="20" fill="#f5b083" transform="rotate(6 628 598)"/>
    <rect x="615" y="620" width="108" height="36" rx="18" fill="#e29a70" transform="rotate(6 615 620)"/>
    <g stroke="#202d3d" stroke-width="7" stroke-linecap="round">
      <path d="M555 608l68-96"/>
      <path d="M704 596l-25-89"/>
    </g>
    <circle cx="622" cy="512" r="9" fill="#f26522"/>
    <circle cx="680" cy="507" r="9" fill="#1f74b7"/>
    <rect x="458" y="612" width="120" height="86" rx="18" fill="#222" stroke="#f5b21f" stroke-width="8" transform="rotate(-3 458 612)"/>
    <rect x="482" y="632" width="65" height="24" rx="6" fill="#9bd4ff" opacity="0.75" transform="rotate(-3 482 632)"/>
  </g>

</svg>
